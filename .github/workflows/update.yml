name: update-formula

on:
  repository_dispatch:
    types: [update-brew]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      TAG: ${{ github.event.client_payload.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        run: |
          URL="https://github.com/taku-256/xgraft/releases/download/${TAG}/xgraft-${TAG}-aarch64-apple-darwin.tar.gz"
          curl -L "$URL" -o xgraft.tar.gz

      - name: Compute SHA256
        id: sha
        run: |
          echo "sha=$(shasum -a 256 xgraft.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Write Formula
        env:
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          python3 scripts/write_formula.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Formula/xgraft.rb
          git commit -m "brew: update ${TAG}" || exit 0
          git push